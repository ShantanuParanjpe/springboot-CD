apiVersion: v1
kind: Service
metadata:
  name: ingress-nginx-controller
  namespace: monitoring
  annotations:
    # Tells Azure to find the IP inside your infrastructure resource group
    service.beta.kubernetes.io/azure-load-balancer-resource-group: MC_raks_raks_northeurope
spec:
  type: LoadBalancer
  loadBalancerIP: 135.236.233.58
  selector:
    app.kubernetes.io/instance: kube-prometheus-stack
    app.kubernetes.io/name: grafana
  ports:
    - name: http
      port: 80
      protocol: TCP
      targetPort: 3000
  
